<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Curv — Beautiful JSON tooling for developers</title>

  <meta
    name="description"
    content="Curv is a privacy-first JSON toolbox for developers. Format, validate, inspect and transform JSON locally."
  />

  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">{ }</div>
        <div>
          <h1>Curv</h1>
          <p>Beautiful JSON tooling for developers.</p>
        </div>
      </div>

      <div class="header-actions">
        <span class="privacy-badge">Local only</span>
      </div>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Input</h2>
            <p>Paste or write JSON here.</p>
          </div>
          <span id="inputStats" class="panel-stat">0 chars</span>
        </div>

        <textarea
          id="jsonInput"
          class="editor"
          spellcheck="false"
          placeholder='{"name":"Curv","type":"json-toolbox"}'
        ></textarea>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Output</h2>
            <p>Formatted or minified JSON appears here.</p>
          </div>
          <span id="outputStats" class="panel-stat">0 chars</span>
        </div>

        <textarea
          id="jsonOutput"
          class="editor editor-output"
          spellcheck="false"
          readonly
          placeholder="Your result will appear here."
        ></textarea>
      </section>
    </main>

    <section class="toolbar">
      <div class="toolbar-group">
        <button id="formatButton" class="button button-primary">Format</button>
        <button id="minifyButton" class="button">Minify</button>
        <button id="copyButton" class="button">Copy output</button>
        <button id="clearButton" class="button button-muted">Clear</button>
      </div>

      <div class="toolbar-group">
        <label class="select-label" for="indentSize">Indent</label>
        <select id="indentSize" class="select">
          <option value="2">2 spaces</option>
          <option value="4">4 spaces</option>
        </select>
      </div>
    </section>

    <footer class="status-bar">
      <span id="statusMessage">Ready.</span>
    </footer>
  </div>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
